name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pin a recent golangci-lint v2 release built with Go 1.25+. Older
          # releases (e.g. 1.64.x, which is what "latest" resolves to on some
          # action versions) reject go 1.25 in go.mod with a "lower than
          # targeted Go version" error. The config file at .golangci.yml uses
          # the v2 schema, so any v2 binary will load it correctly.
          version: v2.11.4
          args: --timeout=5m

      - name: Run govulncheck
        # Scans the module graph for known Go vulnerabilities (CVEs) and
        # fails the job if any affect reachable code. Runs on every push
        # and PR so regressions in transitive deps are caught immediately.
        #
        # repo-checkout is disabled because the action otherwise runs
        # actions/checkout a second time, which re-applies the Authorization
        # header and makes GitHub reject the git fetch with HTTP 400
        # ("Duplicate header: Authorization"). We already checked the code
        # out above, so the second clone is redundant anyway.
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          check-latest: true
          repo-checkout: false

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
          retention-days: 30
