# golangci-lint config (v2 schema - see https://golangci-lint.run/docs/configuration/file/)
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # Disable every linter, then enable only the set we want. This mirrors the
  # old v1 `disable-all: true` + `enable:` pattern using v2 keys.
  default: none
  enable:
    # Security & Error Handling
    - gosec          # Inspects source code for security problems
    - errcheck       # Checks for unchecked errors
    - govet          # Reports suspicious constructs (shadowing, etc.)
    - revive         # Modern replacement for golint

    # Performance & Cleanliness
    - gocyclo        # Computes functions complexity
    - staticcheck    # Advanced static analysis
    - unused         # Checks for unused constants, variables, etc.
    - misspell       # Finds commonly misspelled English words in comments
    - bodyclose      # Checks whether HTTP response bodies are closed
    - prealloc       # Finds slice declarations that could potentially be preallocated

  settings:
    gosec:
      # Specifically check for weak crypto and file permissions.
      severity: medium
      confidence: high

    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: blank-imports
          disabled: true
        - name: var-naming
          disabled: true
        - name: unused-parameter
          disabled: true

  exclusions:
    # Do not apply golangci-lint's built-in "default" excludes - we want full
    # coverage, minus only the rules declared below. Leaving `presets` unset
    # is the v2 equivalent of v1's `exclude-use-default: false`.
    rules:
      - linters: [gosec]
        text: "Log injection via taint analysis"
      - linters: [gosec]
        text: "SQL string formatting"
      - linters: [gosec]
        text: "integer overflow conversion"
      - linters: [revive]
        text: "should have a package comment"
      - linters: [revive]
        text: "exported (.*) should have comment or be unexported"
      - linters: [revive]
        text: "blank-imports:"
      - linters: [revive]
        text: "var-naming:"
      - linters: [revive]
        text: "unused-parameter:"
      - linters: [revive]
        text: "comment on exported function"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
